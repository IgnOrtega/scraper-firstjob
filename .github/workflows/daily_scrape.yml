name: Daily FirstJob Scraper

on:
  schedule:
    # 10:30 UTC ≈ 06:30-07:30 hora de Chile
    - cron: '30 10 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la web de GitHub

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper
      run: python main.py --dir data --delay 2

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/
        git commit -m "Auto-update: FirstJob scraper results $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git pull --rebase --autostash
        git push
